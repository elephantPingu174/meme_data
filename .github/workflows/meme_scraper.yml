name: Meme Scraper

on:
  workflow_dispatch:

  schedule:
    - cron: "2/5 * * * *"
      timezone: "Europe/Warsaw"

permissions:
  contents: write

concurrency:
  group: meme-scraper
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      LOCAL_TIMEZONE: "Europe/Warsaw"
      DATA_DIR: "data"

      # Opcjonalnie możesz później ustawić okno 2 tygodni:
      # COLLECTION_START_LOCAL: "2026-07-05 00:00:00"
      # COLLECTION_END_LOCAL: "2026-07-19 00:00:00"
      COLLECTION_START_LOCAL: ""
      COLLECTION_END_LOCAL: ""

      USER_AGENT: "EducationalMemeStockCollector/1.0 (public GitHub Actions research project; low frequency; no bypassing)"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show repository files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Run scraper once
        run: |
          python meme_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update meme stock data"
            git pull --rebase
            git push
          fi
